spring:
  application:
    name: report-ms
  profiles:
    default: default
  config:
    import: "optional:configserver:http://localhost:7777"
server:
  servlet:
    context-path: /report-ms
  port: 0
eureka:
  instance:
    instance-id: "${spring.application.name}:${random.value}"
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
logging:
  level:
    com.example.reportms.repositories: DEBUG
    feign: DEBUG
feign:
  client:
    config:
      default:
        loggerLevel: FULL
