spring:
  application:
    name: companies-crud-fallback
server:
  servlet:
    context-path: /companies-crud-fallback
  port: 8787
eureka:
  instance:
    instance-id: "${spring.application.name}:${random.value}"
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
logging:
  level:
    com.example.reportms.repositories: DEBUG
    feign: DEBUG
feign:
  client:
    config:
      default:
        loggerLevel: FULL
